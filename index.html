<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEM HUB — ICAN Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#eeeef4;--white:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--sh:0 2px 12px rgba(0,0,0,.07);--sh-lg:0 8px 32px rgba(0,0,0,.13);--sel:#6366f1}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:300;height:52px;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;flex-wrap:nowrap}
.hdr-badge{height:34px;width:34px;flex-shrink:0;background:#1a1a2e;border-radius:8px;display:flex;align-items:center;justify-content:center}
.hdr-badge span{font-family:'DM Serif Display',serif;font-size:13px;color:#C8001A;letter-spacing:.5px}
.hdr-name{font-weight:800;font-size:15px;letter-spacing:-.3px;white-space:nowrap}
.hdr-sub{font-size:10px;color:var(--muted);white-space:nowrap}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.p-g{background:#d1fae5;color:#065f46}.p-a{background:#fef3c7;color:#92400e}.p-gr{background:#f3f4f6;color:#374151}
.hdr-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.hdr-space{flex:1;min-width:4px}
.hdr-date{font-size:11px;color:var(--muted);white-space:nowrap}
.hdr-pills{display:flex;gap:5px}
/* Zoom controls */
.zctrls{display:flex;align-items:center;gap:1px;background:#f3f4f6;border-radius:8px;padding:2px;flex-shrink:0}
.z-btn{border:none;background:transparent;cursor:pointer;width:28px;height:28px;border-radius:6px;font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.z-btn:hover{background:white;color:var(--text)}
.zpct{font-size:11px;font-weight:600;color:var(--muted);min-width:36px;text-align:center}
/* View toggle */
.vtoggle{display:flex;background:#f3f4f6;border-radius:8px;padding:2px;gap:1px;flex-shrink:0}
.vbtn{border:none;background:transparent;cursor:pointer;padding:5px 9px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s;white-space:nowrap}
.vbtn.on{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* Mode toggle */
.mtoggle{display:flex;background:#f3f4f6;border-radius:8px;padding:2px;gap:1px;flex-shrink:0}
.mbtn{border:none;background:transparent;cursor:pointer;padding:5px 9px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s;white-space:nowrap}
.mbtn.on{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.mbtn.on[data-m="select"]{color:#6366f1}
/* Misc header btns */
.hbtn{border:none;background:#f3f4f6;cursor:pointer;padding:5px 9px;border-radius:7px;font-size:10px;font-weight:600;color:var(--muted);transition:all .15s;white-space:nowrap;flex-shrink:0}
.hbtn:hover{background:#e5e7eb;color:var(--text)}
.hbtn.danger:hover{background:#fef2f2;color:#dc2626}

/* ── CANVAS ── */
#cw{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;user-select:none}
#cw.mode-pan{cursor:grab}
#cw.mode-pan.panning{cursor:grabbing}
#cw.mode-select{cursor:crosshair}
#cw.mode-select [data-nid]{cursor:move}
#cw.mode-select [data-nid].dragging{cursor:grabbing}
#vp{position:absolute;top:0;left:0;width:8500px;height:4600px;transform-origin:0 0;opacity:0;animation:vpin .4s ease .1s forwards}
@keyframes vpin{to{opacity:1}}
#vp::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#b8b8cc 1.3px,transparent 1.3px);background-size:30px 30px;background-position:15px 15px;opacity:.4;pointer-events:none;z-index:0}
#svg{position:absolute;top:0;left:0;width:8500px;height:4600px;pointer-events:none;z-index:1;overflow:visible}

/* ── SELECTION RECT ── */
#sel-rect{position:fixed;border:1.5px dashed #6366f1;background:rgba(99,102,241,.06);display:none;pointer-events:none;z-index:500;border-radius:4px}

/* ── NODE SELECTION HIGHLIGHT ── */
[data-nid].sel{outline:2px solid #6366f1;outline-offset:4px;border-radius:14px}

/* ── DRAGGABLE BASE ── */
[data-nid]{position:absolute;z-index:10;transform:translate(-50%,-50%)}
[data-nid].dragging{z-index:50}

/* ── SECTION LABELS (draggable) ── */
.slabel{cursor:grab}
.slabel.dragging{cursor:grabbing}
.sl-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:4px;outline:none}
.sl-title{font-size:24px;font-weight:800;letter-spacing:-.4px;display:block;outline:none;min-width:80px}
.sl-sub{font-size:11px;color:var(--muted);margin-top:3px;display:block;outline:none;min-width:80px}
.sl-bar{height:3px;border-radius:2px;margin-top:8px;width:100%;min-width:200px}
[contenteditable="true"]{outline:2px solid #6366f1!important;border-radius:4px;padding:2px 4px;background:rgba(255,255,255,.9);cursor:text!important}

/* ── LAYER HEADERS (draggable) ── */
.lhdr{cursor:grab;text-align:center}
.lhdr.dragging{cursor:grabbing}
.lh-num{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;opacity:.45;margin-bottom:3px;outline:none}
.lh-name{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;outline:none;min-width:60px}
.lh-bar{height:3px;border-radius:2px;margin:5px auto 0;width:140px}

/* ── INFRA CARDS ── */
.ic{width:222px;background:white;border:1px solid var(--border);border-radius:12px;padding:11px 13px;box-shadow:var(--sh);border-top:3px solid var(--lc,#6366f1);transition:box-shadow .2s;cursor:grab}
.ic:hover{box-shadow:var(--sh-lg)}
.ic.special{border-style:dashed;background:color-mix(in srgb,var(--lc,#6366f1) 4%,white)}
.ih{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px}
.iico{font-size:18px;flex-shrink:0;margin-top:1px}
.inm{font-size:12px;font-weight:700;line-height:1.3;flex:1}
.ibadge{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.irole{font-size:10px;color:var(--muted);line-height:1.55;margin-bottom:5px}
.ipath{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--lc,#6366f1);background:color-mix(in srgb,var(--lc,#6366f1) 8%,transparent);padding:3px 7px;border-radius:5px;margin-bottom:5px;word-break:break-all;line-height:1.5}
.idetail{font-size:9px;color:var(--muted);line-height:1.6;white-space:pre-line}

/* ── HUB CENTER ── */
.hub-c{cursor:grab}
.hub-i{width:168px;height:168px;background:linear-gradient(145deg,#1a1a2e,#0d0d1a);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:0 0 0 3px rgba(200,0,26,.35),0 0 0 14px rgba(200,0,26,.1),0 0 0 30px rgba(200,0,26,.04),0 14px 44px rgba(0,0,0,.55);animation:phub 4s ease-in-out infinite}
@keyframes phub{0%,100%{box-shadow:0 0 0 3px rgba(200,0,26,.35),0 0 0 14px rgba(200,0,26,.1),0 0 0 30px rgba(200,0,26,.04),0 14px 44px rgba(0,0,0,.55)}50%{box-shadow:0 0 0 5px rgba(200,0,26,.45),0 0 0 18px rgba(200,0,26,.15),0 0 0 38px rgba(200,0,26,.07),0 18px 52px rgba(0,0,0,.6)}}
.hub-ican{font-family:'DM Serif Display',serif;font-size:30px;color:#C8001A;letter-spacing:2px;line-height:1}
.hub-jh{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:2px;text-transform:uppercase}
.hub-sub{font-size:8.5px;color:rgba(255,255,255,.35);text-align:center;padding:0 16px;line-height:1.4}

/* ── CAT / TOOL NODES ── */
.cat-n{cursor:grab}
.cat-c{background:white;border:2px solid var(--cc,#6366f1);border-radius:12px;padding:8px 13px;display:flex;align-items:center;gap:7px;box-shadow:var(--sh);white-space:nowrap;transition:box-shadow .2s}
.cat-c:hover{box-shadow:var(--sh-lg)}
.cat-ic{font-size:19px}.cat-nm{font-size:12px;font-weight:700}
.tool-n{cursor:grab}
.tc{width:186px;background:white;border:1px solid var(--border);border-radius:10px;padding:9px 11px 8px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:box-shadow .2s}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cc,#6366f1);border-radius:10px 0 0 10px}
.tc:hover{box-shadow:0 6px 20px rgba(0,0,0,.1)}
.tc.link{cursor:pointer}
.tth{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.tte{font-size:16px;flex-shrink:0;margin-top:1px}.ttn{font-size:11px;font-weight:700;line-height:1.3}
.ttd{font-size:9.5px;color:var(--muted);line-height:1.45;margin-bottom:5px}
.tpath{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--cc,#6366f1);background:color-mix(in srgb,var(--cc,#6366f1) 8%,transparent);padding:2px 5px;border-radius:4px;margin-bottom:5px;word-break:break-all}
.ttf{display:flex;align-items:center;justify-content:space-between;gap:3px}
.sd{display:inline-flex;align-items:center;gap:3px;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sd::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.s-live{color:#059669}.s-live::before{animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.s-dev{color:#d97706}.s-active{color:#2563eb}.s-planned{color:#9ca3af}
.tloc{font-size:8.5px;font-weight:500;background:#f3f4f6;color:var(--muted);padding:2px 5px;border-radius:4px}
.tarr{font-size:8.5px;font-weight:700;color:var(--cc,#6366f1);background:color-mix(in srgb,var(--cc,#6366f1) 10%,transparent);padding:2px 5px;border-radius:4px}

/* ── LEGEND ── */
.legend{position:fixed;bottom:14px;left:14px;z-index:200;background:white;border:1px solid var(--border);border-radius:10px;padding:9px 12px;box-shadow:var(--sh);font-size:10px}
.leg-t{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px}
.leg-r{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-weight:500}
.leg-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-sep{height:1px;background:var(--border);margin:5px 0}
.leg-hint{font-size:9px;color:var(--muted);margin-top:4px;line-height:1.5}

/* ── GRID VIEW ── */
#gv{display:none;position:fixed;top:52px;left:0;right:0;bottom:0;overflow-y:auto;padding:20px;background:var(--bg)}
#gv.on{display:block}
.g-sec{margin-bottom:28px}
.g-hd{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-bottom:12px;border-bottom:2px solid var(--cc,#6366f1)}
.g-ic{font-size:20px}.g-nm{font-size:14px;font-weight:800}.g-ct{margin-left:auto;font-size:10px;color:var(--muted)}
.g-tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.g-tool{background:white;border:1px solid var(--border);border-left:4px solid var(--cc,#6366f1);border-radius:10px;padding:12px 13px;box-shadow:0 1px 5px rgba(0,0,0,.04);transition:transform .2s,box-shadow .2s}
.g-tool.link{cursor:pointer}.g-tool:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.07)}
.g-th{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.g-em{font-size:22px;flex-shrink:0}.g-tn{font-size:12px;font-weight:700;margin-bottom:1px}.g-td{font-size:10px;color:var(--muted);line-height:1.5}
.g-tf{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.g-open{font-size:10px;font-weight:700;color:var(--cc,#6366f1);background:color-mix(in srgb,var(--cc,#6366f1) 10%,transparent);padding:3px 9px;border-radius:5px;text-decoration:none}

@media(max-width:820px){#cw,.legend,.zctrls,.mtoggle,.hdr-date,.hdr-sep{display:none!important}#gv{display:block!important}.hdr-pills,.reset-pos{display:none}}

/* ── EXPLAINER CARDS ── */
.exp-card{width:340px;background:white;border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--sh);cursor:grab}
.exp-card:hover{box-shadow:var(--sh-lg)}
.exp-card.warn-card{border-top:3px solid #f59e0b;background:#fffbf0}
.exp-card.report-card{border-top:3px solid #10b981;background:linear-gradient(145deg,#f0fdf4,white)}
.exp-h{font-size:13px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.exp-hi{font-size:20px;flex-shrink:0}
.exp-body{font-size:11px;color:#374151;line-height:1.75;white-space:pre-line}
.exp-body b{color:#111827;font-weight:700}
.exp-body em{font-style:italic;color:#6b7280}
.exp-code{font-family:'JetBrains Mono',monospace;font-size:10px;background:#f3f4f6;color:#6366f1;padding:2px 5px;border-radius:4px;font-style:normal}
.exp-sep{height:1px;background:var(--border);margin:10px 0}
.exp-num{font-family:'JetBrains Mono',monospace;font-size:10px;line-height:1.9;color:#374151;white-space:pre}
.exp-total{margin-top:8px;padding:8px 10px;background:#d1fae5;border-radius:8px;font-weight:700;font-size:11px;color:#065f46}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-badge"><span>ICAN</span></div>
  <div><div class="hdr-name">JEM HUB</div><div class="hdr-sub">ICAN OS</div></div>
  <div class="hdr-pills" id="hpills" style="display:flex;gap:4px"></div>
  <div class="hdr-sep"></div>
  <!-- Mode toggle -->
  <div class="mtoggle">
    <button class="mbtn on" data-m="pan"    onclick="setMode('pan')">✋ Pan</button>
    <button class="mbtn"    data-m="select" onclick="setMode('select')">⬚ Select</button>
  </div>
  <!-- View toggle -->
  <div class="vtoggle">
    <button class="vbtn on" data-v="map"  onclick="setV('map')">🌳 Map</button>
    <button class="vbtn"    data-v="grid" onclick="setV('grid')">⊞ Grid</button>
  </div>
  <div class="hdr-sep"></div>
  <!-- Zoom -->
  <div class="zctrls">
    <button class="z-btn" onclick="zBy(1.2)">+</button>
    <span class="zpct" id="zpct">60%</span>
    <button class="z-btn" onclick="zBy(1/1.2)">−</button>
    <button class="z-btn" title="Fit all" onclick="fitAll()" style="font-size:10px">⊞</button>
  </div>
  <div class="hdr-sep"></div>
  <button class="hbtn danger" onclick="resetAll()">↺ Reset</button>
  <div class="hdr-space"></div>
  <div class="hdr-date" id="hdate"></div>
</header>

<!-- Canvas -->
<div id="cw" class="mode-pan">
  <div id="vp"><svg id="svg"></svg></div>
</div>

<!-- Selection rectangle -->
<div id="sel-rect"></div>

<!-- Grid view (mobile) -->
<div id="gv"></div>

<!-- Legend -->
<div class="legend">
  <div class="leg-t">Status</div>
  <div class="leg-r"><div class="leg-d" style="background:#059669"></div>Live</div>
  <div class="leg-r"><div class="leg-d" style="background:#d97706"></div>In Dev</div>
  <div class="leg-r"><div class="leg-d" style="background:#2563eb"></div>Active</div>
  <div class="leg-sep"></div>
  <div class="leg-hint">✋ Pan mode — drag canvas<br>⬚ Select mode — drag to select<br>Double-click labels to edit</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  LAYOUT
// ═══════════════════════════════════════════════
const HX=6150, HY=1850, CAT_R=390, TOOL_R=300, FAN=38;
const rad = d=>d*Math.PI/180;
const catXY = c=>({x:HX+CAT_R*Math.cos(rad(c.angle)), y:HY+CAT_R*Math.sin(rad(c.angle))});
const toolXY = (c,i,n)=>{const {x,y}=catXY(c);const a=rad(c.angle+(i-(n-1)/2)*FAN);return{x:x+TOOL_R*Math.cos(a),y:y+TOOL_R*Math.sin(a)};};

// ═══════════════════════════════════════════════
//  TOOL DATA
// ═══════════════════════════════════════════════
const SL={live:'Live',dev:'In Dev',active:'Active',planned:'Planned'};
const TOOLS={categories:[
  {id:"ai",name:"AI & Automation",icon:"⚡",color:"#6366f1",angle:198,tools:[
    {id:"jem-bot", name:"Jem Supervisor Bot",       desc:"24/7 AI on Telegram. Receives messages, reads context MDs, calls Claude, replies.",icon:"🤖",s:"live",loc:"Local PC",path:"Claude\\supervisor\\supervisor.py",url:null},
    {id:"wa-qa",   name:"WhatsApp QA Bot",           desc:"Every 5h: extract group chat, parse questions, Claude replies as teacher.",icon:"💬",s:"dev",loc:"Local PC",path:"Workshops\\Realestate Workshop\\WhatsApp QA Bot\\",url:null},
    {id:"wa-img",  name:"WhatsApp Image Extractor",  desc:"Downloads photos from WhatsApp groups into sorted date/sender folders.",icon:"📸",s:"live",loc:"Local PC",path:"Workshops\\Realestate Workshop\\Whatsapp Image Extractor\\_codex\\",url:null},
  ]},
  {id:"grants",name:"Grants & Funding",icon:"💰",color:"#10b981",angle:342,tools:[
    {id:"grants-db",   name:"Grants Dashboard", desc:"Live tracker — 3 submitted, 6 in progress, 7 researching, $3.5M pipeline.",icon:"📊",s:"live",  loc:"GitHub Pages",path:null,url:"https://shishirkhanal001.github.io/grants-dashboard/"},
    {id:"futurpreneur",name:"Futurpreneur",      desc:"Discovery call Apr 15, 12:15 PM MT — under Daniel Haile.",icon:"🗓️",s:"active",loc:"In Progress",path:"Grants Applications\\Futurpreneur\\",url:null},
    {id:"irap",        name:"IRAP & Others",     desc:"6 applications in progress, 7 in research stage.",icon:"📋",s:"active",loc:"In Progress",path:"Grants Applications\\",url:null},
  ]},
  {id:"film",name:"Film & Production",icon:"🎬",color:"#f59e0b",angle:126,tools:[
    {id:"editor",  name:"ICAN Film Editor Plugin",desc:"Premiere Pro CEP panel. AI transcription in Amharic + Tigrinya. Phase 1 in progress.",icon:"✂️",s:"dev",loc:"Local PC",path:"ICAN FILM EDITOR\\",url:null},
    {id:"plan2026",name:"2026 Annual Plan",       desc:"ICAN Film & Lucy TV strategic dashboard — weekly, quarterly, yearly goals.",icon:"📅",s:"live",loc:"GitHub Pages",path:null,url:"https://shishirkhanal001.github.io/ican-2026-plan/"},
  ]},
  {id:"web",name:"Web & Streaming",icon:"🌐",color:"#3b82f6",angle:54,tools:[
    {id:"lucy-tv",    name:"Lucy TV",    desc:"OTT streaming — African diaspora cinema. SVOD $3.99–$6.99/mo.",icon:"📺",s:"live",loc:"Web",path:null,url:"https://tvlucy.com"},
    {id:"kickstarter",name:"Kickstarter",desc:"CA$8,000 goal — The Last Delivery. Live since Apr 1, 2026.",icon:"🚀",s:"live",loc:"Web",path:null,url:"https://www.kickstarter.com/projects/lucytv/lucy-tv-the-streaming-platform-for-independent-cinema"},
    {id:"jem-hub-t",  name:"JEM HUB",   desc:"This dashboard — all tools + full system architecture in one view.",icon:"🗺️",s:"live",loc:"GitHub Pages",path:"Claude\\JEM-HUB\\index.html",url:"https://shishirkhanal001.github.io/jem-hub/"},
  ]},
  {id:"workshop",name:"Workshop & Education",icon:"📚",color:"#ec4899",angle:270,tools:[
    {id:"re-ws",      name:"Real Estate Workshop",desc:"8-class photography course. Cohort Mar–Apr 2026 active.",icon:"🏠",s:"live",loc:"Local Files",path:"Workshops\\Realestate Workshop\\",url:null},
    {id:"class-books",name:"Class Handbooks",    desc:"8 PDF handbooks, Classes 1–8. All printed and in use.",icon:"📄",s:"live",loc:"Local Files",path:"Workshops\\Realestate Workshop\\Class Documents\\",url:null},
  ]},
]};

// ═══════════════════════════════════════════════
//  INFRA NODES
// ═══════════════════════════════════════════════

The 2026 dashboard and JEM HUB save card positions and task notes in <b>localStorage</b> — storage that lives inside one specific browser on one specific device.

When you edit on your phone, those changes stay in the phone's browser.
When you open the same URL on the PC, it reads the PC's localStorage — which has different or no data.

<b>Why this happens:</b> GitHub Pages is a static site. There's no server storing your state. Each browser has its own isolated localStorage.

<b>Workaround:</b> Treat GitHub Pages dashboards as read-only on mobile. Make all edits on the PC. The PC localStorage is the "source of truth."

function startEdit(el, labelId){
  if(el.contentEditable==='true') return;
  el.contentEditable='true'; el.focus();
  const r=document.createRange(); r.selectNodeContents(el);
  const s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
  function done(){el.contentEditable='false';saveLT(labelId,el.textContent.trim());}
  el.addEventListener('blur',done,{once:true});
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}},);
}

function renderExplainers(vp){
  EXPLAINERS.forEach(e=>{
    const el=mk('div');
    el.innerHTML=`<div class="exp-card${e.cls?' '+e.cls:''}"><div class="exp-h"><span class="exp-hi">${e.icon}</span>${e.title}</div><div class="exp-body">${e.html.trim()}</div></div>`;

function mk(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e;}
function placeNode(el,id,vp){el.dataset.nid=id;const p=NP[id];el.style.left=p.x+'px';el.style.top=p.y+'px';vp.appendChild(el);}

function renderSectionLabels(vp){

function renderCatNodes(vp){

function renderToolNodes(vp){
  TOOLS.categories.forEach(c=>{
    c.tools.forEach(t=>{

      placeNode(el,'tool-'+t.id,vp);

  const colors=[...new Set(EDGES.map(e=>e.c))];
  let h='<defs>';
  colors.forEach(c=>{h+=`<marker id="a${c.replace('#','')}" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="${c}" opacity="0.7"/></marker>`;});
  h+='</defs>';
  EDGES.forEach(e=>{
    const p1=NP[e.f],p2=NP[e.t]; if(!p1||!p2)return;
    const off=Math.max(Math.abs(p2.x-p1.x)*.45,100);
    const d=`M ${p1.x} ${p1.y} C ${p1.x+off} ${p1.y} ${p2.x-off} ${p2.y} ${p2.x} ${p2.y}`;
    const mk=e.dash?'':`marker-end="url(#a${e.c.replace('#','')})"`;
    h+=`<path d="${d}" stroke="${e.c}" stroke-width="${e.w||1.8}" fill="none" opacity="${e.dash?.28:.5}" ${e.dash?'stroke-dasharray="6 4"':''} ${mk}/>`;
  });
  TOOLS.categories.forEach(c=>{
    const cp=NP['cat-'+c.id],hp=NP['hub']; if(!cp||!hp)return;
    h+=`<line x1="${hp.x}" y1="${hp.y}" x2="${cp.x}" y2="${cp.y}" stroke="${c.color}" stroke-width="2" stroke-dasharray="7 5" opacity="0.5"/>`;
    c.tools.forEach(t=>{
      const tp=NP['tool-'+t.id]; if(!tp)return;
      h+=`<path d="M ${cp.x} ${cp.y} Q ${(cp.x+tp.x)/2} ${(cp.y+tp.y)/2} ${tp.x} ${tp.y}" stroke="${c.color}" stroke-width="1.5" fill="none" opacity="0.4"/>`;
    });
  });
  document.getElementById('svg').innerHTML=h;
}

// ═══════════════════════════════════════════════
//  SELECTION
// ═══════════════════════════════════════════════
let selected=new Set();

function toggleSel(nid,addOnly=false){
  if(addOnly){selected.add(nid);}
  else{if(selected.has(nid))selected.delete(nid);else{selected.clear();selected.add(nid);}}
  syncSelectionUI();
}
function clearSel(){selected.clear();syncSelectionUI();}
function syncSelectionUI(){
  document.querySelectorAll('[data-nid].sel').forEach(e=>e.classList.remove('sel'));
  selected.forEach(nid=>{const el=document.querySelector(`[data-nid="${nid}"]`);if(el)el.classList.add('sel');});
}

// ═══════════════════════════════════════════════
//  INTERACTION — pan / drag / select
// ═══════════════════════════════════════════════
const vs={tx:0,ty:0,scale:.6};
let curMode='pan';
let drag=null;
let pan={active:false,sx:0,sy:0,tx:0,ty:0};
let rub=null; // rubber band {sx,sy} in screen coords

function setMode(m){
  curMode=m;
  const cw=document.getElementById('cw');
  cw.className=`mode-${m}`;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  if(m==='pan') clearSel();
}

function applyT(){
  document.getElementById('vp').style.transform=`translate(${vs.tx}px,${vs.ty}px) scale(${vs.scale})`;
  document.getElementById('zpct').textContent=Math.round(vs.scale*100)+'%';
}

function zBy(f,cx,cy){
  const cw=document.getElementById('cw'),W=cw.clientWidth,H=cw.clientHeight;
  const mx=cx??W/2,my=cy??H/2;
  const ns=Math.min(Math.max(vs.scale*f,.15),4);
  vs.tx=mx-(mx-vs.tx)*(ns/vs.scale); vs.ty=my-(my-vs.ty)*(ns/vs.scale);
  vs.scale=ns; applyT();
}

document.getElementById('cw').addEventListener('wheel',e=>{
  e.preventDefault();
  const r=document.getElementById('cw').getBoundingClientRect();
  zBy(e.deltaY>0?.88:1.14,e.clientX-r.left,e.clientY-r.top);
},{passive:false});

function gotoInfra(){const cw=document.getElementById('cw'),W=cw.clientWidth,H=cw.clientHeight;vs.scale=.55;vs.tx=W/2-2050*.55;vs.ty=H/2-1250*.55;applyT();}
function gotoTools(){const cw=document.getElementById('cw'),W=cw.clientWidth,H=cw.clientHeight;vs.scale=.65;vs.tx=W/2-HX*.65;vs.ty=H/2-HY*.65;applyT();}
function fitAll(){const cw=document.getElementById('cw'),W=cw.clientWidth,H=cw.clientHeight;vs.scale=.36;vs.tx=W/2-3800*.36;vs.ty=H/2-1400*.36;applyT();}

// ── Rubber-band helpers ──────────────────────────
const selRect=document.getElementById('sel-rect');
function showRub(x1,y1,x2,y2){
  selRect.style.display='block';
  selRect.style.left=Math.min(x1,x2)+'px';
  selRect.style.top=Math.min(y1,y2)+'px';
  selRect.style.width=Math.abs(x2-x1)+'px';
  selRect.style.height=Math.abs(y2-y1)+'px';
}
function hideRub(){selRect.style.display='none';}

function nodesInRect(sx1,sy1,sx2,sy2){
  const cw=document.getElementById('cw').getBoundingClientRect();
  const minX=Math.min(sx1,sx2),maxX=Math.max(sx1,sx2);
  const minY=Math.min(sy1,sy2)+52,maxY=Math.max(sy1,sy2)+52; // +52 header
  const found=[];
  Object.keys(NP).forEach(nid=>{
    const p=NP[nid];
    const sx=p.x*vs.scale+vs.tx,sy=p.y*vs.scale+vs.ty+52;
    if(sx>=minX&&sx<=maxX&&sy>=minY&&sy<=maxY) found.push(nid);
  });
  return found;
}

// ── Main mouse events ────────────────────────────
document.getElementById('cw').addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  const nodeEl=e.target.closest('[data-nid]');
  const isEditing=e.target.contentEditable==='true';
  if(isEditing) return;

  if(nodeEl){
    e.stopPropagation();
    const nid=nodeEl.dataset.nid;
    const pos=NP[nid];
    drag={
      nid, el:nodeEl,
      ox:(e.clientX-vs.tx)/vs.scale-pos.x,
      oy:(e.clientY-vs.ty)/vs.scale-pos.y,
      moved:false, sx:e.clientX, sy:e.clientY,
      startNP: selected.size>1&&selected.has(nid)
        ? Object.fromEntries([...selected].map(id=>[id,{...NP[id]}]))
        : null
    };
    nodeEl.classList.add('dragging');
  } else {
    if(curMode==='select'){
      rub={sx:e.clientX,sy:e.clientY};
    } else {
      pan.active=true; pan.sx=e.clientX; pan.sy=e.clientY; pan.tx=vs.tx; pan.ty=vs.ty;
      document.getElementById('cw').classList.add('panning');
    }
  }
});

window.addEventListener('mousemove',e=>{
  if(drag){
    if(!drag.moved&&(Math.abs(e.clientX-drag.sx)>4||Math.abs(e.clientY-drag.sy)>4)) drag.moved=true;
    if(drag.moved){
      const nx=(e.clientX-vs.tx)/vs.scale-drag.ox;
      const ny=(e.clientY-vs.ty)/vs.scale-drag.oy;
      if(drag.startNP&&selected.size>1){
        // Multi-drag: move all selected by same delta from start positions
        const dx=nx-drag.startNP[drag.nid].x, dy=ny-drag.startNP[drag.nid].y;
        selected.forEach(nid=>{
          if(!drag.startNP[nid]) return;
          NP[nid]={x:drag.startNP[nid].x+dx, y:drag.startNP[nid].y+dy};
          const el=document.querySelector(`[data-nid="${nid}"]`);
          if(el){el.style.left=NP[nid].x+'px';el.style.top=NP[nid].y+'px';}
        });
      } else {
        NP[drag.nid]={x:nx,y:ny};
        drag.el.style.left=nx+'px';
        drag.el.style.top=ny+'px';
      }
      drawConnections();
    }
  } else if(pan.active){
    vs.tx=pan.tx+(e.clientX-pan.sx); vs.ty=pan.ty+(e.clientY-pan.sy); applyT();
  } else if(rub){
    showRub(rub.sx,rub.sy,e.clientX,e.clientY);
  }
});

window.addEventListener('mouseup',e=>{
  if(drag){
    drag.el.classList.remove('dragging');
    if(!drag.moved){
      // Click — toggle selection
      if(curMode==='select') toggleSel(drag.nid, e.shiftKey);
      // If it's a link node and not dragging, allow click to propagate naturally
    } else {
      saveNP();
    }
    drag=null;
  }
  if(pan.active){pan.active=false;document.getElementById('cw').classList.remove('panning');}
  if(rub){
    const moved=Math.abs(e.clientX-rub.sx)>8||Math.abs(e.clientY-rub.sy)>8;
    if(moved){
      const found=nodesInRect(rub.sx,rub.sy,e.clientX,e.clientY);
      if(!e.shiftKey) selected.clear();
      found.forEach(nid=>selected.add(nid));
      syncSelectionUI();
    } else if(!e.shiftKey){
      clearSel();
    }
    hideRub(); rub=null;
  }
});

// Touch pan
let tl=null;
document.getElementById('cw').addEventListener('touchstart',e=>{if(e.touches.length===1)tl={x:e.touches[0].clientX,y:e.touches[0].clientY};});
document.getElementById('cw').addEventListener('touchmove',e=>{e.preventDefault();if(e.touches.length===1&&tl){vs.tx+=e.touches[0].clientX-tl.x;vs.ty+=e.touches[0].clientY-tl.y;tl={x:e.touches[0].clientX,y:e.touches[0].clientY};applyT();}},{passive:false});
document.getElementById('cw').addEventListener('touchend',()=>tl=null);

// ═══════════════════════════════════════════════
//  VIEW TOGGLE + GRID + HEADER
// ═══════════════════════════════════════════════
function setV(v){
  const isM=v==='map';
  document.getElementById('cw').style.display=isM?'block':'none';
  document.getElementById('gv').classList.toggle('on',!isM);
  document.querySelector('.legend').style.display=isM?'block':'none';
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
}

function renderGrid(){
  let h='';
  TOOLS.categories.forEach(c=>{
    h+=`<div class="g-sec" style="--cc:${c.color}"><div class="g-hd"><span class="g-ic">${c.icon}</span><span class="g-nm">${c.name}</span><span class="g-ct">${c.tools.length} tools</span></div><div class="g-tools">`;
    c.tools.forEach(t=>{
      const hl=!!t.url;
      const foot=hl?`<a href="${t.url}" target="_blank" class="g-open" style="--cc:${c.color}" onclick="event.stopPropagation()">Open ↗</a>`:`<span style="font-size:10px;color:var(--muted)">${t.loc}</span>`;
      h+=`<div class="g-tool${hl?' link':''}" style="--cc:${c.color}" ${hl?`onclick="window.open('${t.url}','_blank')"`:''}>
        <div class="g-th"><span class="g-em">${t.icon}</span><div><div class="g-tn">${t.name}</div><div class="g-td">${t.desc}</div></div></div>
        <div class="g-tf"><span class="sd s-${t.s}">${SL[t.s]}</span>${foot}</div>
      </div>`;
    });
    h+='</div></div>';
  });
  document.getElementById('gv').innerHTML=h;
}

function renderHeader(){
  const all=TOOLS.categories.flatMap(c=>c.tools);
  document.getElementById('hpills').innerHTML=`<span class="pill p-g">${all.filter(t=>t.s==='live').length} Live</span><span class="pill p-a">${all.filter(t=>t.s==='dev').length} In Dev</span><span class="pill p-gr">${all.length} Tools</span>`;
  document.getElementById('hdate').textContent=new Date().toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  buildDefaults(); loadState();
  renderAll(); renderGrid(); renderHeader();
  requestAnimationFrame(()=>gotoInfra());
});
</script>
