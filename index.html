<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEM HUB — ICAN Operating System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f4f4f8; --white: #fff; --text: #111827; --muted: #6b7280;
      --border: #e5e7eb; --sh: 0 2px 12px rgba(0,0,0,.07); --sh-lg: 0 8px 32px rgba(0,0,0,.12);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

    /* ── HEADER ─────────────────────────────────── */
    .hdr {
      position:fixed; top:0; left:0; right:0; z-index:300; height:54px;
      background:rgba(255,255,255,.94); backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:12px; padding:0 16px;
    }
    .hdr-logo {
      width:34px; height:34px; flex-shrink:0;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      border-radius:9px; display:flex; align-items:center; justify-content:center;
      font-size:18px; box-shadow:0 2px 8px rgba(99,102,241,.4);
    }
    .hdr-title { font-weight:800; font-size:15px; letter-spacing:-.3px; }
    .hdr-sub   { font-size:10px; color:var(--muted); }
    .hdr-pills { display:flex; gap:6px; margin-left:4px; }
    .pill { font-size:10px; font-weight:700; padding:3px 8px; border-radius:20px; }
    .p-g  { background:#d1fae5; color:#065f46; }
    .p-a  { background:#fef3c7; color:#92400e; }
    .p-gr { background:#f3f4f6; color:#374151; }
    .hdr-space { flex:1; }
    .hdr-date  { font-size:11px; color:var(--muted); }
    .zoom-ctrls { display:flex; align-items:center; gap:2px; background:var(--bg); border-radius:8px; padding:2px; }
    .z-btn {
      border:none; background:transparent; cursor:pointer; width:28px; height:28px;
      border-radius:6px; font-size:14px; font-weight:700; color:var(--muted);
      display:flex; align-items:center; justify-content:center; transition:all .15s;
    }
    .z-btn:hover { background:white; color:var(--text); }
    .z-pct { font-size:11px; font-weight:600; color:var(--muted); min-width:36px; text-align:center; }
    .view-toggle { display:flex; background:var(--bg); border-radius:8px; padding:2px; gap:2px; }
    .v-btn { border:none; background:transparent; cursor:pointer; padding:5px 10px; border-radius:6px; font-size:11px; font-weight:600; color:var(--muted); transition:all .15s; }
    .v-btn.on { background:white; color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .infra-btn {
      border:none; background:transparent; cursor:pointer; width:32px; height:32px; border-radius:8px;
      font-size:16px; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:all .15s;
    }
    .infra-btn:hover, .infra-btn.on { background:#eff0ff; color:#6366f1; }

    /* ── INFINITE CANVAS ─────────────────────────── */
    #canvas-wrap {
      position:fixed; top:54px; left:0; right:0; bottom:0;
      overflow:hidden; cursor:grab; user-select:none;
    }
    #canvas-wrap.panning { cursor:grabbing; }
    #canvas-vp {
      position:absolute; top:0; left:0;
      width:4200px; height:2600px;
      transform-origin:0 0;
    }
    /* Dot grid */
    #canvas-vp::before {
      content:''; position:absolute; inset:0;
      background-image:radial-gradient(circle,#c7c8d9 1.2px,transparent 1.2px);
      background-size:30px 30px; background-position:15px 15px;
      opacity:.45; pointer-events:none;
    }
    #connections {
      position:absolute; top:0; left:0; width:4200px; height:2600px;
      pointer-events:none; z-index:1; overflow:visible;
    }

    /* ── CENTER NODE ───────────────────────────── */
    .hub-center {
      position:absolute; z-index:20; transform:translate(-50%,-50%);
    }
    .hub-inner {
      width:152px; height:152px;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      border-radius:50%;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px;
      box-shadow:0 0 0 10px rgba(99,102,241,.13),0 0 0 26px rgba(99,102,241,.06),0 8px 32px rgba(99,102,241,.45);
      animation:phub 3.5s ease-in-out infinite;
    }
    @keyframes phub {
      0%,100% { box-shadow:0 0 0 10px rgba(99,102,241,.13),0 0 0 26px rgba(99,102,241,.06),0 8px 32px rgba(99,102,241,.45); }
      50%      { box-shadow:0 0 0 15px rgba(99,102,241,.18),0 0 0 34px rgba(99,102,241,.09),0 12px 40px rgba(99,102,241,.55); }
    }
    .hub-em  { font-size:40px; }
    .hub-nm  { font-size:13px; font-weight:800; color:#fff; letter-spacing:.5px; }
    .hub-sub { font-size:9px; color:rgba(255,255,255,.6); text-align:center; padding:0 12px; }

    /* ── CATEGORY NODES ────────────────────────── */
    .cat-n {
      position:absolute; z-index:10; transform:translate(-50%,-50%);
      animation:fadein .4s ease forwards; opacity:0;
    }
    .cat-c {
      background:white; border:2px solid var(--cc,#6366f1); border-radius:13px;
      padding:9px 14px; display:flex; align-items:center; gap:8px;
      box-shadow:var(--sh); white-space:nowrap;
      transition:transform .2s, box-shadow .2s;
    }
    .cat-c:hover { transform:translateY(-2px) translate(0,0); box-shadow:var(--sh-lg); }
    .cat-ic { font-size:20px; }
    .cat-nm { font-size:13px; font-weight:700; }
    @keyframes fadein {
      from { opacity:0; transform:translate(-50%,calc(-50% + 12px)); }
      to   { opacity:1; transform:translate(-50%,-50%); }
    }

    /* ── TOOL CARDS ────────────────────────────── */
    .tool-n { position:absolute; z-index:8; transform:translate(-50%,-50%); animation:fadein .4s ease forwards; opacity:0; }
    .tool-c {
      width:170px; background:white; border:1px solid var(--border); border-radius:11px;
      padding:10px 12px 9px; position:relative; overflow:hidden;
      box-shadow:0 2px 8px rgba(0,0,0,.05); transition:transform .2s,box-shadow .2s;
    }
    .tool-c::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--cc,#6366f1); border-radius:11px 0 0 11px; }
    .tool-c:hover { transform:translateY(-3px) translate(0,0); box-shadow:0 8px 24px rgba(0,0,0,.1); }
    .tool-c.link { cursor:pointer; }
    .th { display:flex; align-items:flex-start; gap:7px; margin-bottom:5px; }
    .te { font-size:17px; flex-shrink:0; margin-top:1px; }
    .tn { font-size:11.5px; font-weight:700; line-height:1.3; }
    .td { font-size:10px; color:var(--muted); line-height:1.45; margin-bottom:7px; }
    .tf { display:flex; align-items:center; justify-content:space-between; gap:4px; }
    .sd { display:inline-flex; align-items:center; gap:4px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
    .sd::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }
    .s-live { color:#059669; } .s-live::before { animation:blink 2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .s-dev { color:#d97706; } .s-active { color:#2563eb; } .s-planned { color:#9ca3af; }
    .loc { font-size:9px; font-weight:500; background:#f3f4f6; color:var(--muted); padding:2px 6px; border-radius:4px; white-space:nowrap; }
    .arr { font-size:9px; font-weight:700; color:var(--cc,#6366f1); background:color-mix(in srgb,var(--cc,#6366f1) 10%,transparent); padding:2px 6px; border-radius:4px; }

    /* ── LEGEND ────────────────────────────────── */
    .legend {
      position:fixed; bottom:16px; left:16px; z-index:200;
      background:white; border:1px solid var(--border); border-radius:10px;
      padding:10px 13px; box-shadow:var(--sh);
    }
    .leg-title { font-weight:700; font-size:9px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin-bottom:6px; }
    .leg-row { display:flex; align-items:center; gap:6px; margin-bottom:3px; font-size:10px; }
    .leg-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

    /* ── INFRA PANEL ───────────────────────────── */
    #infra-panel {
      position:fixed; top:54px; right:0; bottom:0; width:310px; z-index:250;
      background:white; border-left:1px solid var(--border);
      transform:translateX(100%); transition:transform .3s ease;
      display:flex; flex-direction:column; overflow:hidden;
    }
    #infra-panel.open { transform:translateX(0); }
    .ip-head {
      padding:16px 16px 12px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:8px; flex-shrink:0;
    }
    .ip-title { font-weight:800; font-size:14px; flex:1; }
    .ip-close { border:none; background:transparent; cursor:pointer; font-size:18px; color:var(--muted); width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:6px; }
    .ip-close:hover { background:var(--bg); }
    .ip-tabs { display:flex; padding:8px; gap:4px; border-bottom:1px solid var(--border); flex-shrink:0; }
    .ip-tab { flex:1; border:none; background:transparent; cursor:pointer; padding:6px; border-radius:8px; font-size:11px; font-weight:600; color:var(--muted); transition:all .15s; }
    .ip-tab.on { background:#eff0ff; color:#6366f1; }
    .ip-body { flex:1; overflow-y:auto; padding:12px; }
    .ip-body::-webkit-scrollbar { width:4px; }
    .ip-body::-webkit-scrollbar-track { background:transparent; }
    .ip-body::-webkit-scrollbar-thumb { background:#e5e7eb; border-radius:4px; }

    /* Folder tree */
    .tree { font-family:'JetBrains Mono',monospace; font-size:11px; line-height:1.8; }
    .tree-line { display:flex; align-items:center; gap:5px; }
    .tree-indent { color:#d1d5db; }
    .tree-folder { color:#6366f1; font-weight:600; }
    .tree-file   { color:#374151; }
    .tree-tag {
      font-size:9px; font-weight:700; padding:1px 5px; border-radius:4px;
      margin-left:4px; vertical-align:middle; font-family:'Inter',sans-serif;
    }
    .tag-brain { background:#eff0ff; color:#6366f1; }
    .tag-live  { background:#d1fae5; color:#065f46; }
    .tag-dev   { background:#fef3c7; color:#92400e; }

    /* Flow diagram */
    .flow { display:flex; flex-direction:column; align-items:center; gap:0; }
    .flow-node {
      width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px;
      padding:10px 14px; display:flex; align-items:center; gap:10px;
    }
    .flow-icon { font-size:20px; flex-shrink:0; }
    .flow-label { font-size:12px; font-weight:700; }
    .flow-sub   { font-size:10px; color:var(--muted); margin-top:1px; }
    .flow-arrow { font-size:18px; color:#d1d5db; margin:2px 0; }
    .flow-tag   { font-size:9px; font-weight:700; padding:2px 6px; border-radius:5px; margin-top:2px; width:fit-content; }

    /* GitHub repos */
    .repo-card {
      background:var(--bg); border:1px solid var(--border); border-radius:10px;
      padding:10px 12px; margin-bottom:8px;
    }
    .repo-name { font-size:12px; font-weight:700; margin-bottom:2px; }
    .repo-url  { font-size:10px; color:#6366f1; word-break:break-all; text-decoration:none; }
    .repo-url:hover { text-decoration:underline; }
    .repo-foot { display:flex; align-items:center; justify-content:space-between; margin-top:6px; }
    .repo-stat { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }

    /* IP section headers */
    .ip-sec { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:14px 0 8px; }
    .ip-sec:first-child { margin-top:0; }

    /* ── GRID VIEW (mobile + toggle) ─────────────── */
    #grid-view { display:none; position:fixed; top:54px; left:0; right:0; bottom:0; overflow-y:auto; padding:20px; }
    #grid-view.on { display:block; }
    .g-sec { margin-bottom:32px; }
    .g-hd  { display:flex; align-items:center; gap:8px; padding-bottom:8px; margin-bottom:12px; border-bottom:2px solid var(--cc,#6366f1); }
    .g-ic  { font-size:20px; }
    .g-nm  { font-size:14px; font-weight:800; }
    .g-ct  { margin-left:auto; font-size:10px; color:var(--muted); font-weight:500; }
    .g-tools { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px; }
    .g-tool {
      background:white; border:1px solid var(--border); border-left:4px solid var(--cc,#6366f1);
      border-radius:11px; padding:13px 14px; box-shadow:0 1px 5px rgba(0,0,0,.04);
      transition:transform .2s,box-shadow .2s;
    }
    .g-tool.link { cursor:pointer; }
    .g-tool:hover { transform:translateY(-2px); box-shadow:0 5px 18px rgba(0,0,0,.07); }
    .g-th  { display:flex; align-items:flex-start; gap:8px; margin-bottom:7px; }
    .g-em  { font-size:24px; flex-shrink:0; }
    .g-tn  { font-size:12px; font-weight:700; margin-bottom:1px; }
    .g-td  { font-size:10px; color:var(--muted); line-height:1.5; }
    .g-tf  { display:flex; align-items:center; justify-content:space-between; margin-top:9px; }
    .g-open { font-size:10px; font-weight:700; color:var(--cc,#6366f1); background:color-mix(in srgb,var(--cc,#6366f1) 10%,transparent); padding:3px 9px; border-radius:5px; text-decoration:none; }
    .g-open:hover { filter:brightness(.9); }
    .g-plat { font-size:10px; color:var(--muted); }

    /* ── RESPONSIVE ─────────────────────────────── */
    @media(max-width:820px) {
      #canvas-wrap,#infra-panel,.legend { display:none!important; }
      .zoom-ctrls,.infra-btn,.hdr-date,.v-btn[data-v="tree"] { display:none!important; }
      #grid-view { display:block!important; }
      .hdr-pills { display:none; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-logo">🤖</div>
  <div>
    <div class="hdr-title">JEM HUB</div>
    <div class="hdr-sub">ICAN Operating System</div>
  </div>
  <div class="hdr-pills" id="hpills"></div>
  <div class="hdr-space"></div>
  <div class="hdr-date" id="hdate"></div>
  <div class="zoom-ctrls">
    <button class="z-btn" onclick="zoomBy(1.2)" title="Zoom in">+</button>
    <span class="z-pct" id="zpct">100%</span>
    <button class="z-btn" onclick="zoomBy(1/1.2)" title="Zoom out">−</button>
    <button class="z-btn" onclick="resetView()" title="Reset view" style="font-size:11px">⌂</button>
  </div>
  <div class="view-toggle">
    <button class="v-btn on" data-v="tree" onclick="setView('tree')">🌳 Map</button>
    <button class="v-btn" data-v="grid" onclick="setView('grid')">⊞ Grid</button>
  </div>
  <button class="infra-btn" id="infra-btn" onclick="toggleInfra()" title="Infrastructure panel">🗂️</button>
</header>

<!-- ── INFINITE CANVAS ────────────────────────────── -->
<div id="canvas-wrap">
  <div id="canvas-vp">
    <svg id="connections"></svg>
    <div class="hub-center" id="hub-c">
      <div class="hub-inner">
        <div class="hub-em">🤖</div>
        <div class="hub-nm">JEM HUB</div>
        <div class="hub-sub">ICAN Operating System</div>
      </div>
    </div>
  </div>
</div>

<!-- ── GRID VIEW ──────────────────────────────────── -->
<div id="grid-view"></div>

<!-- ── INFRA PANEL ────────────────────────────────── -->
<div id="infra-panel">
  <div class="ip-head">
    <span style="font-size:20px">🗂️</span>
    <div class="ip-title">Infrastructure</div>
    <button class="ip-close" onclick="toggleInfra()">✕</button>
  </div>
  <div class="ip-tabs">
    <button class="ip-tab on" onclick="ipTab('folders')">📁 Folders</button>
    <button class="ip-tab" onclick="ipTab('flow')">⚡ How It Works</button>
    <button class="ip-tab" onclick="ipTab('github')">🌐 GitHub</button>
  </div>
  <div class="ip-body" id="ip-body"></div>
</div>

<!-- ── LEGEND ─────────────────────────────────────── -->
<div class="legend">
  <div class="leg-title">Status</div>
  <div class="leg-row"><div class="leg-dot" style="background:#059669"></div> Live</div>
  <div class="leg-row"><div class="leg-dot" style="background:#d97706"></div> In Dev</div>
  <div class="leg-row"><div class="leg-dot" style="background:#2563eb"></div> Active</div>
  <div class="leg-row"><div class="leg-dot" style="background:#9ca3af"></div> Planned</div>
</div>

<script>
// ═══════════════════════════════════════════════
//  TOOL DATA
// ═══════════════════════════════════════════════
const DATA = {
  categories: [
    { id:"ai",       name:"AI & Automation",    icon:"⚡", color:"#6366f1", angle:198,
      tools:[
        { name:"Jem Supervisor Bot",       desc:"Your AI on Telegram — runs 24/7 on this PC.",             icon:"🤖", s:"live",    loc:"Local PC",     url:null },
        { name:"WhatsApp QA Bot",          desc:"Auto-answers student questions every 5h from group chat.", icon:"💬", s:"dev",     loc:"Local PC",     url:null },
        { name:"WhatsApp Image Extractor", desc:"Downloads workshop group photos into sorted folders.",    icon:"📸", s:"live",    loc:"Local PC",     url:null },
      ]},
    { id:"grants",   name:"Grants & Funding",   icon:"💰", color:"#10b981", angle:342,
      tools:[
        { name:"Grants Dashboard",  desc:"Live tracker for all funding applications.",          icon:"📊", s:"live",   loc:"GitHub Pages", url:"https://shishirkhanal001.github.io/grants-dashboard/" },
        { name:"Futurpreneur",      desc:"Discovery call Apr 15, 12:15 PM MT — Daniel Haile.", icon:"🗓️", s:"active", loc:"In Progress",  url:null },
        { name:"IRAP & Others",     desc:"6 applications in progress, 7 in research.",         icon:"📋", s:"active", loc:"In Progress",  url:null },
      ]},
    { id:"film",     name:"Film & Production",  icon:"🎬", color:"#f59e0b", angle:126,
      tools:[
        { name:"ICAN Film Editor Plugin", desc:"Premiere Pro CEP + AI transcription (Amharic/Tigrinya).", icon:"✂️", s:"dev",  loc:"Local PC",     url:null },
        { name:"2026 Annual Plan",        desc:"ICAN Film & Lucy TV strategic plan dashboard.",           icon:"📅", s:"live", loc:"GitHub Pages", url:"https://shishirkhanal001.github.io/ican-2026-plan/" },
      ]},
    { id:"web",      name:"Web & Streaming",    icon:"🌐", color:"#3b82f6", angle:54,
      tools:[
        { name:"Lucy TV",    desc:"OTT streaming — African diaspora cinema. $3.99–6.99/mo.", icon:"📺", s:"live", loc:"Web",          url:"https://tvlucy.com" },
        { name:"Kickstarter",desc:"CA$8,000 goal — The Last Delivery. Launched Apr 1.",      icon:"🚀", s:"live", loc:"Web",          url:"https://www.kickstarter.com/projects/lucytv/lucy-tv-the-streaming-platform-for-independent-cinema" },
        { name:"JEM HUB",    desc:"This dashboard — all tools, one view.",                   icon:"🗺️", s:"live", loc:"GitHub Pages", url:"https://shishirkhanal001.github.io/jem-hub/" },
      ]},
    { id:"workshop", name:"Workshop & Education",icon:"📚", color:"#ec4899", angle:270,
      tools:[
        { name:"Real Estate Workshop", desc:"8-class photography course — Mar–Apr 2026 cohort active.", icon:"🏠", s:"live", loc:"Local Files", url:null },
        { name:"Class Handbooks",      desc:"8 PDF handbooks, Classes 1–8, all printed.",              icon:"📄", s:"live", loc:"Local Files", url:null },
      ]},
  ]
};

// ═══════════════════════════════════════════════
//  LAYOUT — canvas coords (hub at HX, HY)
// ═══════════════════════════════════════════════
const CW=4200, CH=2600, HX=2100, HY=1300, CAT_R=320, TOOL_R=210, FAN=22;
const rad = d => d*Math.PI/180;

function catXY(cat) {
  return { x: HX + CAT_R*Math.cos(rad(cat.angle)), y: HY + CAT_R*Math.sin(rad(cat.angle)) };
}
function toolXY(cat, i, n) {
  const {x,y} = catXY(cat);
  const a = rad(cat.angle + (i-(n-1)/2)*FAN);
  return { x: x+TOOL_R*Math.cos(a), y: y+TOOL_R*Math.sin(a) };
}

// ═══════════════════════════════════════════════
//  RENDER TREE
// ═══════════════════════════════════════════════
const SL = { live:'Live', dev:'In Dev', active:'Active', planned:'Planned' };

function renderTree() {
  const vp  = document.getElementById('canvas-vp');
  const svg = document.getElementById('connections');
  svg.setAttribute('viewBox', `0 0 ${CW} ${CH}`);

  // Gradient defs
  let defs = '<defs>';
  DATA.categories.forEach(c => {
    const {x,y} = catXY(c);
    defs += `<linearGradient id="g${c.id}" x1="${HX}" y1="${HY}" x2="${x}" y2="${y}" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="${c.color}" stop-opacity=".1"/>
      <stop offset="100%" stop-color="${c.color}" stop-opacity=".65"/>
    </linearGradient>`;
  });
  defs += '</defs>';

  let lines = '', nodes = '';

  document.getElementById('hub-c').style.cssText = `left:${HX}px;top:${HY}px`;

  DATA.categories.forEach((cat, ci) => {
    const {x:cx,y:cy} = catXY(cat);
    const d0 = ci*70;

    // Hub → cat (dashed)
    lines += `<line x1="${HX}" y1="${HY}" x2="${cx}" y2="${cy}"
      stroke="url(#g${cat.id})" stroke-width="2.2" stroke-dasharray="7 5"
      opacity="0" style="animation:fadein .5s ${d0}ms ease forwards"/>`;

    // Cat node
    nodes += `<div class="cat-n" style="left:${cx}px;top:${cy}px;--cc:${cat.color};animation-delay:${d0+100}ms">
      <div class="cat-c"><span class="cat-ic">${cat.icon}</span><span class="cat-nm">${cat.name}</span></div>
    </div>`;

    cat.tools.forEach((t, ti) => {
      const {x:tx,y:ty} = toolXY(cat,ti,cat.tools.length);
      const dt = d0+200+ti*55;
      const mx=(cx+tx)/2, my=(cy+ty)/2;

      // Cat → tool (curved)
      lines += `<path d="M ${cx} ${cy} Q ${mx} ${my} ${tx} ${ty}"
        stroke="${cat.color}" stroke-width="1.5" fill="none"
        opacity="0" style="animation:fadein .5s ${dt}ms ease forwards"/>`;

      const badge = t.url
        ? `<span class="arr" style="--cc:${cat.color}">↗ Open</span>`
        : `<span class="loc">${t.loc}</span>`;
      const click = t.url ? `onclick="window.open('${t.url}','_blank')"` : '';

      nodes += `<div class="tool-n" style="left:${tx}px;top:${ty}px;--cc:${cat.color};animation-delay:${dt+60}ms">
        <div class="tool-c ${t.url?'link':''}" ${click}>
          <div class="th"><span class="te">${t.icon}</span><span class="tn">${t.name}</span></div>
          <div class="td">${t.desc}</div>
          <div class="tf"><span class="sd s-${t.s}">${SL[t.s]}</span>${badge}</div>
        </div>
      </div>`;
    });
  });

  svg.innerHTML = defs + lines;
  vp.insertAdjacentHTML('beforeend', nodes);
}

// ═══════════════════════════════════════════════
//  INFINITE CANVAS — pan + zoom
// ═══════════════════════════════════════════════
const state = { tx:0, ty:0, scale:1 };

function applyT() {
  document.getElementById('canvas-vp').style.transform = `translate(${state.tx}px,${state.ty}px) scale(${state.scale})`;
  document.getElementById('zpct').textContent = Math.round(state.scale*100)+'%';
}

function resetView() {
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  state.scale = 0.75;
  state.tx = W/2 - HX*state.scale;
  state.ty = H/2 - HY*state.scale;
  applyT();
}

function zoomBy(factor, clientX, clientY) {
  const wrap = document.getElementById('canvas-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const mx = clientX ?? W/2;
  const my = clientY ?? H/2;
  const newScale = Math.min(Math.max(state.scale*factor, 0.2), 4);
  state.tx = mx - (mx - state.tx) * (newScale/state.scale);
  state.ty = my - (my - state.ty) * (newScale/state.scale);
  state.scale = newScale;
  applyT();
}

(function setupCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  let panning=false, sx,sy,stx,sty;

  wrap.addEventListener('mousedown', e => {
    if (e.target.closest('.tool-c.link,.cat-c,.ip-body')) return;
    panning=true; sx=e.clientX; sy=e.clientY; stx=state.tx; sty=state.ty;
    wrap.classList.add('panning');
  });
  window.addEventListener('mouseup', ()=>{ panning=false; wrap.classList.remove('panning'); });
  window.addEventListener('mousemove', e=>{
    if (!panning) return;
    state.tx = stx+(e.clientX-sx);
    state.ty = sty+(e.clientY-sy);
    applyT();
  });

  // Pinch/scroll zoom
  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const factor = e.ctrlKey
      ? (e.deltaY>0?0.95:1.05)  // pinch
      : (e.deltaY>0?0.90:1.10); // scroll
    const r = wrap.getBoundingClientRect();
    zoomBy(factor, e.clientX-r.left, e.clientY-r.top);
  }, {passive:false});

  // Touch pan
  let tLast=null;
  wrap.addEventListener('touchstart', e=>{ if(e.touches.length===1) tLast={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
  wrap.addEventListener('touchmove', e=>{
    e.preventDefault();
    if(e.touches.length===1&&tLast){
      state.tx += e.touches[0].clientX-tLast.x;
      state.ty += e.touches[0].clientY-tLast.y;
      tLast={x:e.touches[0].clientX,y:e.touches[0].clientY};
      applyT();
    }
  },{passive:false});
  wrap.addEventListener('touchend',()=>tLast=null);
})();
