<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEM HUB — ICAN Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#eeeef4;--white:#fff;--text:#111827;--muted:#6b7280;--border:#e5e7eb;--sh:0 2px 12px rgba(0,0,0,.07);--sh-lg:0 8px 32px rgba(0,0,0,.13);--ci:#8b5cf6;--cs:#6366f1;--cm:#10b981;--ca:#f59e0b;--co:#3b82f6}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:300;height:52px;background:rgba(255,255,255,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 14px}
.hdr-badge{height:34px;width:34px;flex-shrink:0;background:#1a1a2e;border-radius:8px;display:flex;align-items:center;justify-content:center}
.hdr-badge span{font-family:'DM Serif Display',serif;font-size:13px;color:#C8001A;letter-spacing:.5px}
.hdr-name{font-weight:800;font-size:15px;letter-spacing:-.3px}
.hdr-sub{font-size:10px;color:var(--muted)}
.pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.p-g{background:#d1fae5;color:#065f46}.p-a{background:#fef3c7;color:#92400e}.p-gr{background:#f3f4f6;color:#374151}
.hdr-sep{width:1px;height:22px;background:var(--border)}
.hdr-space{flex:1}
.hdr-date{font-size:11px;color:var(--muted)}
.zctrls{display:flex;align-items:center;gap:1px;background:#f3f4f6;border-radius:8px;padding:2px}
.z-btn{border:none;background:transparent;cursor:pointer;width:28px;height:28px;border-radius:6px;font-size:13px;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.z-btn:hover{background:white;color:var(--text)}
.zpct{font-size:11px;font-weight:600;color:var(--muted);min-width:40px;text-align:center}
.vtoggle{display:flex;background:#f3f4f6;border-radius:8px;padding:2px;gap:1px}
.vbtn{border:none;background:transparent;cursor:pointer;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s}
.vbtn.on{background:white;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.reset-pos{border:none;background:#f3f4f6;cursor:pointer;padding:5px 10px;border-radius:7px;font-size:10px;font-weight:600;color:var(--muted);transition:all .15s;white-space:nowrap}
.reset-pos:hover{background:#fef2f2;color:#dc2626}

/* ── CANVAS ── */
#cw{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;user-select:none}
#cw.pan{cursor:grabbing}
#vp{position:absolute;top:0;left:0;width:8500px;height:4600px;transform-origin:0 0;opacity:0;animation:vpin .4s ease .1s forwards}
@keyframes vpin{to{opacity:1}}
#vp::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#b8b8cc 1.3px,transparent 1.3px);background-size:30px 30px;background-position:15px 15px;opacity:.4;pointer-events:none;z-index:0}
#svg{position:absolute;top:0;left:0;width:8500px;height:4600px;pointer-events:none;z-index:1;overflow:visible}

/* ── SECTION LABELS ── */
.slabel{position:absolute;z-index:3;pointer-events:none}
.sl-tag{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px}
.sl-title{font-size:26px;font-weight:800;letter-spacing:-.4px;display:block}
.sl-sub{font-size:12px;color:var(--muted);margin-top:4px;display:block}
.sl-bar{height:3px;border-radius:2px;margin-top:10px;width:100%}

/* ── LAYER HEADERS ── */
.lhdr{position:absolute;z-index:3;transform:translateX(-50%);pointer-events:none;text-align:center}
.lh-num{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:2px;opacity:.45;margin-bottom:3px}
.lh-name{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.lh-bar{height:3px;border-radius:2px;margin:5px auto 0;width:160px}

/* ── DRAGGABLE BASE ── */
[data-nid]{position:absolute;z-index:10;transform:translate(-50%,-50%);cursor:grab}
[data-nid].dragging{cursor:grabbing;z-index:50}
[data-nid]:active{cursor:grabbing}

/* ── INFRA CARDS ── */
.ic{width:222px;background:white;border:1px solid var(--border);border-radius:12px;padding:11px 13px;box-shadow:var(--sh);border-top:3px solid var(--lc,#6366f1);transition:box-shadow .2s}
.ic:hover{box-shadow:var(--sh-lg)}
.ic.special{border-style:dashed;background:color-mix(in srgb,var(--lc,#6366f1) 4%,white)}
.ih{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px}
.iico{font-size:18px;flex-shrink:0;margin-top:1px}
.inm{font-size:12px;font-weight:700;line-height:1.3;flex:1}
.ibadge{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:2px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;margin-top:1px}
.irole{font-size:10px;color:var(--muted);line-height:1.55;margin-bottom:5px}
.ipath{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--lc,#6366f1);background:color-mix(in srgb,var(--lc,#6366f1) 8%,transparent);padding:3px 7px;border-radius:5px;margin-bottom:5px;word-break:break-all;line-height:1.5}
.idetail{font-size:9px;color:var(--muted);line-height:1.6;white-space:pre-line}

/* ── HUB CENTER ── */
.hub-c{position:absolute;z-index:20;transform:translate(-50%,-50%);cursor:grab}
.hub-i{width:168px;height:168px;background:linear-gradient(145deg,#1a1a2e,#0d0d1a);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;box-shadow:0 0 0 3px rgba(200,0,26,.35),0 0 0 14px rgba(200,0,26,.1),0 0 0 30px rgba(200,0,26,.04),0 14px 44px rgba(0,0,0,.55);animation:phub 4s ease-in-out infinite}
@keyframes phub{0%,100%{box-shadow:0 0 0 3px rgba(200,0,26,.35),0 0 0 14px rgba(200,0,26,.1),0 0 0 30px rgba(200,0,26,.04),0 14px 44px rgba(0,0,0,.55)}50%{box-shadow:0 0 0 5px rgba(200,0,26,.45),0 0 0 18px rgba(200,0,26,.15),0 0 0 38px rgba(200,0,26,.07),0 18px 52px rgba(0,0,0,.6)}}
.hub-ican{font-family:'DM Serif Display',serif;font-size:30px;color:#C8001A;letter-spacing:2px;line-height:1}
.hub-jh{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:2px;text-transform:uppercase}
.hub-sub{font-size:8.5px;color:rgba(255,255,255,.35);text-align:center;padding:0 16px;line-height:1.4}

/* ── CATEGORY NODES ── */
.cat-n{position:absolute;z-index:10;transform:translate(-50%,-50%);cursor:grab}
.cat-c{background:white;border:2px solid var(--cc,#6366f1);border-radius:12px;padding:8px 13px;display:flex;align-items:center;gap:7px;box-shadow:var(--sh);white-space:nowrap;transition:box-shadow .2s}
.cat-c:hover{box-shadow:var(--sh-lg)}
.cat-ic{font-size:19px}.cat-nm{font-size:12px;font-weight:700}

/* ── TOOL CARDS ── */
.tool-n{position:absolute;z-index:8;transform:translate(-50%,-50%);cursor:grab}
.tc{width:186px;background:white;border:1px solid var(--border);border-radius:10px;padding:9px 11px 8px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:box-shadow .2s}
.tc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cc,#6366f1);border-radius:10px 0 0 10px}
.tc:hover{box-shadow:0 6px 20px rgba(0,0,0,.1)}
.tc.link{cursor:pointer}
.tth{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.tte{font-size:16px;flex-shrink:0;margin-top:1px}
.ttn{font-size:11px;font-weight:700;line-height:1.3}
.ttd{font-size:9.5px;color:var(--muted);line-height:1.45;margin-bottom:5px}
.tpath{font-family:'JetBrains Mono',monospace;font-size:8.5px;color:var(--cc,#6366f1);background:color-mix(in srgb,var(--cc,#6366f1) 8%,transparent);padding:2px 5px;border-radius:4px;margin-bottom:5px;word-break:break-all}
.ttf{display:flex;align-items:center;justify-content:space-between;gap:3px}
.sd{display:inline-flex;align-items:center;gap:3px;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sd::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.s-live{color:#059669}.s-live::before{animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.s-dev{color:#d97706}.s-active{color:#2563eb}.s-planned{color:#9ca3af}
.tloc{font-size:8.5px;font-weight:500;background:#f3f4f6;color:var(--muted);padding:2px 5px;border-radius:4px}
.tarr{font-size:8.5px;font-weight:700;color:var(--cc,#6366f1);background:color-mix(in srgb,var(--cc,#6366f1) 10%,transparent);padding:2px 5px;border-radius:4px}

/* ── LEGEND ── */
.legend{position:fixed;bottom:14px;left:14px;z-index:200;background:white;border:1px solid var(--border);border-radius:10px;padding:9px 12px;box-shadow:var(--sh)}
.leg-t{font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:6px}
.leg-r{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:10px;font-weight:500}
.leg-d{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.leg-sep{height:1px;background:var(--border);margin:5px 0}
.leg-row2{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:10px}
.leg-line{width:18px;height:2px;flex-shrink:0}
.leg-dash{width:18px;flex-shrink:0;border-top:2px dashed #aaa}

/* ── GRID VIEW ── */
#gv{display:none;position:fixed;top:52px;left:0;right:0;bottom:0;overflow-y:auto;padding:20px;background:var(--bg)}
#gv.on{display:block}
.g-sec{margin-bottom:28px}
.g-hd{display:flex;align-items:center;gap:8px;padding-bottom:8px;margin-bottom:12px;border-bottom:2px solid var(--cc,#6366f1)}
.g-ic{font-size:20px}.g-nm{font-size:14px;font-weight:800}.g-ct{margin-left:auto;font-size:10px;color:var(--muted)}
.g-tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.g-tool{background:white;border:1px solid var(--border);border-left:4px solid var(--cc,#6366f1);border-radius:10px;padding:12px 13px;box-shadow:0 1px 5px rgba(0,0,0,.04);transition:transform .2s,box-shadow .2s}
.g-tool.link{cursor:pointer}.g-tool:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.07)}
.g-th{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.g-em{font-size:22px;flex-shrink:0}.g-tn{font-size:12px;font-weight:700;margin-bottom:1px}.g-td{font-size:10px;color:var(--muted);line-height:1.5}
.g-tf{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.g-open{font-size:10px;font-weight:700;color:var(--cc,#6366f1);background:color-mix(in srgb,var(--cc,#6366f1) 10%,transparent);padding:3px 9px;border-radius:5px;text-decoration:none}

@media(max-width:820px){#cw,.legend,.zctrls,.hdr-date,.hdr-sep{display:none!important}#gv{display:block!important}.hdr-pills{display:none}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-badge"><span>ICAN</span></div>
  <div><div class="hdr-name">JEM HUB</div><div class="hdr-sub">ICAN Operating System</div></div>

  <div class="hdr-sep"></div>
  <div class="zctrls">
    <button class="z-btn" onclick="zBy(1.2)">+</button>

// ══════════════════════════════════════════
//  NODE POSITIONS
// ══════════════════════════════════════════
let NP = {}; // { id: {x,y} }

function buildDefaults() {
  NP = {};
  NP['hub'] = {x:HX, y:HY};
  TOOLS.categories.forEach(c => {
    NP['cat-'+c.id] = catXY(c);
    c.tools.forEach((t,i) => { NP['tool-'+t.id] = toolXY(c,i,c.tools.length); });
  });
  INFRA.forEach(n => { NP[n.id] = {x:n.dx, y:n.dy}; });
}

function loadNP() {
  try { const s=JSON.parse(localStorage.getItem('jh-np')||'{}'); Object.assign(NP,s); } catch(e) {}
}
function saveNP() {
  try { localStorage.setItem('jh-np', JSON.stringify(NP)); } catch(e) {}
}
function resetPositions() {
  localStorage.removeItem('jh-np'); buildDefaults(); renderAll(); fitAll();
}

// ══════════════════════════════════════════
//  CONNECTIONS (SVG)
// ══════════════════════════════════════════
function drawConnections() {
  const colors = [...new Set(EDGES.map(e=>e.c))];
  let h = '<defs>';
  colors.forEach(c => {
    h += `<marker id="a${c.replace('#','')}" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="${c}" opacity="0.7"/></marker>`;
  });
  h += '</defs>';

  // Infra edges
  EDGES.forEach(e => {
    const p1=NP[e.f], p2=NP[e.t];
    if(!p1||!p2) return;
    const dx=p2.x-p1.x;
    const off=Math.max(Math.abs(dx)*0.45,100);
    const d=`M ${p1.x} ${p1.y} C ${p1.x+off} ${p1.y} ${p2.x-off} ${p2.y} ${p2.x} ${p2.y}`;
    const marker = e.dash ? '' : `marker-end="url(#a${e.c.replace('#','')})"`;
    h += `<path d="${d}" stroke="${e.c}" stroke-width="${e.w||1.8}" fill="none" opacity="${e.dash?0.28:0.5}" ${e.dash?'stroke-dasharray="6 4"':''} ${marker}/>`;
  });

  // Hub → Category → Tool connections
  TOOLS.categories.forEach(c => {
    const cp=NP['cat-'+c.id], hp=NP['hub'];
    if(!cp||!hp) return;
    h += `<line x1="${hp.x}" y1="${hp.y}" x2="${cp.x}" y2="${cp.y}" stroke="${c.color}" stroke-width="2" stroke-dasharray="7 5" opacity="0.5"/>`;
    c.tools.forEach(t => {
      const tp=NP['tool-'+t.id];
      if(!tp) return;
      h += `<path d="M ${cp.x} ${cp.y} Q ${(cp.x+tp.x)/2} ${(cp.y+tp.y)/2} ${tp.x} ${tp.y}" stroke="${c.color}" stroke-width="1.5" fill="none" opacity="0.4"/>`;
    });
  });

  document.getElementById('svg').innerHTML = h;
}

// ══════════════════════════════════════════
//  DRAG INDIVIDUAL CARDS
// ══════════════════════════════════════════
let drag = null;

document.addEventListener('DOMContentLoaded', () => {
  const cw = document.getElementById('cw');

  cw.addEventListener('mousedown', e => {
    const nodeEl = e.target.closest('[data-nid]');
    if (nodeEl && !e.target.closest('.tc.link')) {
      e.stopPropagation();
      const nid = nodeEl.dataset.nid;
      const pos = NP[nid];
      drag = {
        nid, el: nodeEl,
        ox: (e.clientX - vs.tx) / vs.scale - pos.x,
        oy: (e.clientY - vs.ty) / vs.scale - pos.y,
        moved: false, sx: e.clientX, sy: e.clientY
      };
      nodeEl.classList.add('dragging');
    } else if (!nodeEl) {
      pan.active = true; pan.sx=e.clientX; pan.sy=e.clientY; pan.tx=vs.tx; pan.ty=vs.ty;
      cw.classList.add('pan');
    }
  });

  window.addEventListener('mousemove', e => {
    if (drag) {
      if (!drag.moved && (Math.abs(e.clientX-drag.sx)>4||Math.abs(e.clientY-drag.sy)>4)) drag.moved=true;
      if (drag.moved) {
        const nx = (e.clientX-vs.tx)/vs.scale - drag.ox;
        const ny = (e.clientY-vs.ty)/vs.scale - drag.oy;
        NP[drag.nid] = {x:nx, y:ny};
        drag.el.style.left = nx+'px';
        drag.el.style.top  = ny+'px';
        drawConnections();
      }
    } else if (pan.active) {
      vs.tx = pan.tx + (e.clientX-pan.sx);
      vs.ty = pan.ty + (e.clientY-pan.sy);
      applyT();
    }
  });

  window.addEventListener('mouseup', () => {
    if (drag) { drag.el.classList.remove('dragging'); if(drag.moved) saveNP(); drag=null; }
    if (pan.active) { pan.active=false; cw.classList.remove('pan'); }
  });

  // Touch pan
  let tl=null;
  cw.addEventListener('touchstart', e=>{ if(e.touches.length===1) tl={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
  cw.addEventListener('touchmove', e=>{ e.preventDefault(); if(e.touches.length===1&&tl){ vs.tx+=e.touches[0].clientX-tl.x; vs.ty+=e.touches[0].clientY-tl.y; tl={x:e.touches[0].clientX,y:e.touches[0].clientY}; applyT(); } },{passive:false});
  cw.addEventListener('touchend',()=>tl=null);
});

// ══════════════════════════════════════════
//  PAN + ZOOM
// ══════════════════════════════════════════
const vs = {tx:0, ty:0, scale:.6};
const pan = {active:false, sx:0, sy:0, tx:0, ty:0};

function applyT() {
  document.getElementById('vp').style.transform = `translate(${vs.tx}px,${vs.ty}px) scale(${vs.scale})`;
  document.getElementById('zpct').textContent = Math.round(vs.scale*100)+'%';
}

function zBy(f, cx, cy) {
  const cw=document.getElementById('cw');
  const W=cw.clientWidth, H=cw.clientHeight;
  const mx=cx??W/2, my=cy??H/2;
  const ns=Math.min(Math.max(vs.scale*f,.15),4);
  vs.tx=mx-(mx-vs.tx)*(ns/vs.scale);
  vs.ty=my-(my-vs.ty)*(ns/vs.scale);
  vs.scale=ns; applyT();
}

document.getElementById('cw').addEventListener('wheel', e=>{
  e.preventDefault();
  const r=document.getElementById('cw').getBoundingClientRect();
  zBy(e.deltaY>0?.88:1.14, e.clientX-r.left, e.clientY-r.top);
},{passive:false});

function gotoInfra() {
  const cw=document.getElementById('cw'), W=cw.clientWidth, H=cw.clientHeight;
  vs.scale=.55; vs.tx=W/2-2050*.55; vs.ty=H/2-1250*.55; applyT();
}
function gotoTools() {
  const cw=document.getElementById('cw'), W=cw.clientWidth, H=cw.clientHeight;
  vs.scale=.65; vs.tx=W/2-HX*.65; vs.ty=H/2-HY*.65; applyT();
}
function fitAll() {
  const cw=document.getElementById('cw'), W=cw.clientWidth, H=cw.clientHeight;
  vs.scale=.38; vs.tx=W/2-4200*.38; vs.ty=H/2-1500*.38; applyT();
}

    c.tools.forEach(t=>{
      const hasLink=!!t.url;
      const foot=hasLink?`<a href="${t.url}" target="_blank" class="g-open" style="--cc:${c.color}" onclick="event.stopPropagation()">Open ↗</a>`:`<span style="font-size:10px;color:var(--muted)">${t.loc}</span>`;

        <div class="g-th"><span class="g-em">${t.icon}</span><div><div class="g-tn">${t.name}</div><div class="g-td">${t.desc}</div></div></div>
        <div class="g-tf"><span class="sd s-${t.s}">${SL[t.s]}</span>${foot}</div>
      </div>`;
    });
    h+='</div></div>';
  });
  document.getElementById('gv').innerHTML = h;
}

function setV(v) {
  const isM=v==='map';
  document.getElementById('cw').style.display=isM?'block':'none';
  document.getElementById('gv').classList.toggle('on',!isM);
  document.querySelector('.legend').style.display=isM?'block':'none';
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
}
